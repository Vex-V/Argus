# Alembic configuration for Argus.
# The DB URL is injected at runtime from shared.config (see migrations/env.py),
# so sqlalchemy.url below is only a placeholder.

[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url = postgresql://argus:argus_dev@localhost:5432/argus

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
